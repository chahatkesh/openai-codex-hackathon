services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fusekit
      POSTGRES_PASSWORD: fusekit
      POSTGRES_DB: fusekit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fusekit"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb -p local/fusekit-artifacts || true
      "

  platform:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://fusekit:fusekit@postgres:5432/fusekit"
      DATABASE_URL_SYNC: "postgresql://fusekit:fusekit@postgres:5432/fusekit"
      INTEGRATOR_URL: "http://integrator:8001"
      ARTIFACT_BACKEND: "s3"
      ARTIFACT_S3_ENDPOINT_URL: "http://minio:9000"
      ARTIFACT_BUCKET: "fusekit-artifacts"
      ARTIFACT_S3_ACCESS_KEY: "minioadmin"
      ARTIFACT_S3_SECRET_KEY: "minioadmin"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_started
    volumes:
      - ../services/platform:/app
    command: >
      sh -c "python -m app.db_init && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    working_dir: /app

  integrator:
    build:
      context: ..
      dockerfile: infra/Dockerfile.integrator
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: "postgresql+asyncpg://fusekit:fusekit@postgres:5432/fusekit"
      PLATFORM_API_URL: "http://platform:8000"
      ARTIFACT_BACKEND: "s3"
      ARTIFACT_S3_ENDPOINT_URL: "http://minio:9000"
      ARTIFACT_BUCKET: "fusekit-artifacts"
      ARTIFACT_S3_ACCESS_KEY: "minioadmin"
      ARTIFACT_S3_SECRET_KEY: "minioadmin"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_started
    volumes:
      - ../services/integrator:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    working_dir: /app

volumes:
  pgdata:
  minio-data:
